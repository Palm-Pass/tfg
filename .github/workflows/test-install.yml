name: Test AUR Package Install

on:
  workflow_run:
    workflows: ["Publish to AUR"]
    types: [completed]

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Arch Linux environment
        uses: rangho-actions/setup-arch@v1
        with:
          packages: uv python gcc cmake pam dbus gobject-introspection cairo mesa sudo

      - name: Set up builder user and build package
        shell: arch.sh {0}
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          cp -r $GITHUB_WORKSPACE /home/builder/pkg
          chown -R builder:builder /home/builder/pkg
          sudo -u builder bash -c "cd /home/builder/pkg && makepkg -si --noconfirm"

      - name: Verify installation
        shell: arch.sh {0}
        run: |
          test -f /usr/lib/security/pam_gesture.so
          test -f /usr/lib/howdy/compare-gesture.py
          test -f /usr/lib/howdy/palm_pass_authenticator.py
          test -f /usr/bin/howdy-gesture-config
          test -f /usr/bin/howdy-gesture-only
          test -f /etc/howdy/config.ini
          echo "All files installed correctly"
