name: Test AUR Package Install

on:
  workflow_run:
    workflows: ["Publish to AUR"]
    types: [completed]

jobs:
  test:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    container:
      image: archlinux:latest

    steps:
      - name: Install git before checkout
        run: pacman -Sy --noconfirm git

      - uses: actions/checkout@v4

      - name: Update system and install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            git \
            uv \
            python \
            gcc \
            cmake \
            pam \
            dbus \
            gobject-introspection \
            cairo \
            mesa

      - name: Set up non-root builder user
        run: |
          useradd -m builder
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          cp -r . /home/builder/pkg
          chown -R builder:builder /home/builder/pkg

      - name: Build and install package
        run: sudo -u builder bash -c "cd /home/builder/pkg && GIT_TERMINAL_PROMPT=0 makepkg -si --noconfirm"

      - name: Verify installation
        run: |
          test -f /usr/lib/security/pam_gesture.so
          test -f /usr/lib/howdy/compare-gesture.py
          test -f /usr/lib/howdy/palm_pass_authenticator.py
          test -f /usr/bin/howdy-gesture-config
          test -f /usr/bin/howdy-gesture-only
          test -f /etc/howdy/config.ini
          echo "All files installed correctly"
