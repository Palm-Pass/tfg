[core]
# The path to the face model files
# (Not used when using howdy as a library with overridden paths)
# dlib_data_dir = /usr/share/dlib-data

# Use the CNN face detector instead of the HOG one
# CNN is more accurate but requires much more CPU/GPU power
use_cnn = false

[video]
# The path to the camera device
# Typically /dev/video0 for built-in webcams
device_path = /dev/video0

# The timeout for the camera to open in seconds
timeout = 4

# Threshold for darkness, 0 is fully black
dark_threshold = 50.0

# The certainty required for a match, 0.0 to 1.0 (lower is more certain)
certainty = 3.5

# Rotate the camera frame by 90, 180 or 270 degrees
rotate = 0

# The maximum height of the video frame in pixels
max_height = 320.0

# Manual exposure setting for the camera
exposure = -1

[gestures]
# The target gesture for authentication
target_gesture = rock

[gesture-only]
# If true, skip face recognition and only check for the gesture
gesture_only = false

[snapshots]
save_failed = false
save_successful = false

[debug]
end_report = false
gtk_stdout = false
